<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Rounded app icon background -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Half-open eye: flat top, curved bottom -->
  <!-- Top lid (straight line) -->
  <line x1="116" y1="240" x2="396" y2="240" stroke="#fff" stroke-width="28" stroke-linecap="round"/>
  <!-- Bottom lid (curve) -->
  <path d="M116 240 Q256 400 396 240" stroke="#fff" stroke-width="28" stroke-linecap="round" fill="none"/>
  <!-- Pupil -->
  <circle cx="256" cy="290" r="42" fill="#fff"/>
</svg>
